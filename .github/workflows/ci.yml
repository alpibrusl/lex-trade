name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lex
        run: |
          set -euo pipefail
          V=0.10.0; T=x86_64-unknown-linux-gnu
          curl -fsSL "https://github.com/alpibrusl/lex-lang/releases/download/v$V/lex-v$V-$T.tar.gz" -o /tmp/lex.tgz
          tar -xzf /tmp/lex.tgz -C /tmp
          echo "/tmp/lex-v$V-$T" >> "$GITHUB_PATH"
      - name: lex ci
        run: lex ci
